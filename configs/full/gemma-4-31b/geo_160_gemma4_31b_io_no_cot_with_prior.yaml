# Benchmark - Geo (160, google/gemma-4-31B-it, INITIALLY_OBSERVABLE, no CoT, with prior)
# Run: python benchmark_runner.py --config configs/full/gemma-4-31b/geo_160_gemma4_31b_io_no_cot_with_prior.yaml

models:
  seeker:
    model: "google/gemma-4-31B-it"
    api_key: "vllm_ceia_100"
    timeout: 180.0

  oracle:
    model: "Qwen3-8B"
    timeout: 120.0
    extra_body:
      chat_template_kwargs:
        enable_thinking: true

  pruner:
    model: "Qwen3-8B"
    timeout: 120.0
    extra_body:
      chat_template_kwargs:
        enable_thinking: true

game:
  observability_mode: "INITIALLY_OBSERVABLE"
  max_turns: 30

dataset:
  type: "geo"
  csv_path: "data/geo/top_160_pop_cities.csv"
  num_targets: null
  runs_per_target: 1
  pool_description: >
    The candidate pool consists of the 160 most populous cities in the world,
    selected strictly by population rank.

experiment:
  name: "geo_160_gemma4_31b_io_no_cot_with_prior"
  max_workers: 16
  tags:
    prior: "population_rank"

output:
  base_dir: "outputs"
  save_conversations: true
  save_graph_plots: false

debug:
  enabled: true
