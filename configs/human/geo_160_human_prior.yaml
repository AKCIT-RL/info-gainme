# Human Baseline — Geo (160 cities, With Hint)
# Mode: WH — user sees full candidate list once before game starts, then it disappears
# Backend: same as PO (PARTIALLY_OBSERVABLE), the hint is frontend-only

models:
  seeker:
    model: "human"

  oracle:
    model: "Qwen3-8B"
    use_reasoning: true
    timeout: 300.0

  pruner:
    model: "Qwen3-8B"
    use_reasoning: true
    timeout: 300.0

game:
  observability_mode: "PARTIALLY_OBSERVABLE"
  max_turns: 30

dataset:
  type: "geo"
  csv_path: "data/geo/top_160_pop_cities.csv"
  num_targets: null
  runs_per_target: 1

experiment:
  name: "geo_160_human_prior"
  max_workers: 1
  tags:
    seeker_type: "human"

output:
  base_dir: "outputs"
  save_conversations: true
  save_graph_plots: false

debug:
  enabled: true
