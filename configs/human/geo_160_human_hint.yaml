# Human Baseline — Geo (160 cities, With Prior)
# Mode: WP — user is told about the candidate pool but won't see the list during play

models:
  seeker:
    model: "human"

  oracle:
    model: "Qwen3-8B"
    timeout: 300.0

  pruner:
    model: "Qwen3-8B"
    timeout: 300.0

game:
  observability_mode: "PARTIALLY_OBSERVABLE"
  max_turns: 30

dataset:
  type: "geo"
  csv_path: "data/geo/top_160_pop_cities.csv"
  num_targets: null
  runs_per_target: 1
  pool_description: "The candidate pool consists of the 160 most populous cities in the world, selected strictly by population rank."

experiment:
  name: "geo_160_human_hint"
  max_workers: 1
  tags:
    seeker_type: "human"

output:
  base_dir: "outputs"
  save_conversations: true
  save_graph_plots: false

debug:
  enabled: true
