# Human Baseline — Objects (158 objects, With Prior)
# Mode: WP — user is told about the candidate pool but won't see the list during play

models:
  seeker:
    model: "human"

  oracle:
    model: "Qwen3-8B"
    use_reasoning: true
    timeout: 300.0

  pruner:
    model: "Qwen3-8B"
    use_reasoning: true
    timeout: 300.0

game:
  observability_mode: "PARTIALLY_OBSERVABLE"
  max_turns: 30

dataset:
  type: "objects"
  csv_path: "data/objects/objects_full.csv"
  num_targets: null
  runs_per_target: 1
  pool_description: "The candidate pool consists of 158 concrete objects from categories including sports, animals, fruits, vehicles, etc."

experiment:
  name: "objects_158_human_hint"
  max_workers: 1
  tags:
    seeker_type: "human"

output:
  base_dir: "outputs"
  save_conversations: true
  save_graph_plots: false

debug:
  enabled: true
