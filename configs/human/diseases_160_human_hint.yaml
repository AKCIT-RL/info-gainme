# Human Baseline — Diseases (160 diseases, With Prior)
# Mode: WP — user is told about the candidate pool but won't see the list during play

models:
  seeker:
    model: "human"

  oracle:
    model: "Qwen3-8B"
    use_reasoning: true
    timeout: 300.0

  pruner:
    model: "Qwen3-8B"
    use_reasoning: true
    timeout: 300.0

game:
  observability_mode: "PARTIALLY_OBSERVABLE"
  max_turns: 30

dataset:
  type: "diseases"
  csv_path: "data/diseases/diseases_full_160.csv"
  num_targets: null
  runs_per_target: 1
  pool_description: "The candidate pool consists of 160 medical conditions/diseases with associated symptoms."

experiment:
  name: "diseases_160_human_hint"
  max_workers: 1
  tags:
    seeker_type: "human"

output:
  base_dir: "outputs"
  save_conversations: true
  save_graph_plots: false

debug:
  enabled: true
