# Benchmark Configuration - Diseases Test (40 diseases, FO + no COT)
# Run: python benchmark_runner.py --config configs/diseases_test_fo_no_cot.yaml

models:
  seeker:
    model: "Qwen3-30B-A3B-Instruct-2507"
    base_url: "http://10.100.0.121:8021/v1"
    timeout: 180.0
    extra_body:
      chat_template_kwargs:
        enable_thinking: false

  oracle:
    model: "Qwen3-8B"
    base_url: "http://10.100.0.121:8021/v1"
    timeout: 120.0

  pruner:
    model: "Qwen3-8B"
    base_url: "http://10.100.0.121:8021/v1"
    timeout: 120.0

game:
  observability_mode: "FULLY_OBSERVABLE"
  max_turns: 30

dataset:
  type: "diseases"
  csv_path: "data/diseases/diseases_test.csv"
  num_targets: null
  runs_per_target: 1

experiment:
  name: "diseases_test_30b_fo_no_cot"
  max_workers: 16

output:
  base_dir: "outputs"
  save_conversations: true
  save_graph_plots: false

debug:
  enabled: true
