# Benchmark Configuration - Diseases Dataset (773 diseases)
# Run: python benchmark_runner.py --config configs/diseases_test_cot.yaml
# Preprocess first: python scripts/prepare_diseases_csv.py

models:
  seeker:
    model: "Qwen3-8B"
    timeout: 120.0
    extra_body:
      chat_template_kwargs: 
        enable_thinking: true

  oracle:
    model: "Qwen3-8B"
    timeout: 120.0


  pruner:
    model: "Qwen3-8B"
    timeout: 120.0

game:
  observability_mode: "PARTIALLY_OBSERVABLE"
  max_turns: 30

dataset:
  type: "diseases"
  csv_path: "data/diseases/diseases_test.csv"
  num_targets: null
  runs_per_target: 1

experiment:
  name: "diseases_40_8b_po_cot"
  max_workers: 16

output:
  base_dir: "outputs"
  save_conversations: true
  save_graph_plots: false

debug:
  enabled: true
